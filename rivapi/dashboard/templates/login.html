<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Log in — {{.Branding.StationName}}</title>
    <link rel="stylesheet" href="/static/vendor/pico.min.css">
    <link rel="stylesheet" href="/static/app.css">
</head>
<body>
<main class="container" style="max-width: 28rem; padding-top: 6rem;">
    {{if .Branding.LogoURL}}
    <div style="text-align:center; margin-bottom: 1.5rem;">
        <img src="{{.Branding.LogoURL}}" alt="{{.Branding.StationName}}" style="height:3.5rem;">
    </div>
    {{end}}
    <h2 style="text-align:center; margin-bottom: 1.5rem;">{{.Branding.StationName}}</h2>

    {{if .Error}}
    <p class="flash-error">{{.Error}}</p>
    {{end}}

    <form method="POST" action="/login">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" autocomplete="username" required autofocus>

        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>

        <button type="submit">Log in</button>
    </form>
</main>
</body>
</html>
