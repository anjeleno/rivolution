{{define "page"}}
<h2>Carts{{if .GroupFilter}} — {{.GroupFilter}}{{end}}</h2>
<div id="carts-list"
     hx-get="/carts?partial=1{{if .GroupFilter}}&group={{.GroupFilter}}{{end}}"
     hx-trigger="load"
     hx-indicator="#spinner">
    <span id="spinner" class="htmx-indicator">Loading…</span>
</div>
{{end}}
