name: Build x64 .deb packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-26.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git g++ automake autoconf autoconf-archive libtool \
            libltdl-dev make debhelper dpkg-dev \
            qt6-base-dev qt6-base-dev-tools qt6-l10n-tools qt6-webengine-dev \
            qt6-webengine-dev-tools libqt6sql6-mysql \
            libexpat1-dev libid3-3.8.3-dev libcurl4-gnutls-dev libcoverart-dev \
            libdiscid-dev libmusicbrainz5-dev libcdparanoia-dev libsndfile1-dev \
            libpam0g-dev libvorbis-dev libsamplerate0-dev libsoundtouch-dev \
            libsystemd-dev libjack-jackd2-dev libasound2-dev libflac-dev \
            libflac++-dev libmp3lame-dev libmad0-dev libtwolame-dev libssl-dev \
            libtag1-dev libmagick++-dev \
            docbook5-xml docbook-xsl-ns xsltproc fop libxml2-utils \
            python3 python3-pycurl python3-pymysql python3-serial python3-requests \
            python3-venv python3-virtualenv python3-build twine \
            apache2 mariadb-server mariadb-client mp3gain gedit \
            golang-go

      - name: Verify Go toolchain version
        run: go version

      - name: Build .deb packages
        run: scripts/rebuild-deb.sh --no-bump

      - name: Collect build artifacts
        run: |
          mkdir -p dist
          mv ../rivolution*.deb ../rivolution*.buildinfo ../rivolution*.changes dist/
          ls -la dist/

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: rivolution-x64-debs
          path: dist/*

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"

          if ! gh release view "$TAG" >/dev/null 2>&1; then
            echo "==> No release exists yet for $TAG, creating one"
            gh release create "$TAG" --title "$TAG" \
              --notes "Automated x64 build. arm64 build/notes to follow."
          fi

          echo "==> Uploading x64 build artifacts"
          gh release upload "$TAG" dist/* --clobber

          VERSION_REV="$(cat versions/PACKAGE_VERSION)-$(grep -oP '(?<=@VERSION@-)[0-9]+(?=\))' debian/changelog.src | head -1)"
          CURRENT_BODY="$(gh release view "$TAG" --json body -q .body)"

          if ! grep -q '^## x64 build$' <<<"$CURRENT_BODY"; then
            echo "==> Appending x64 section to release notes"
            NEW_SECTION=$(printf '\n\n## x64 build\n\n```\nwget https://github.com/%s/releases/download/%s/rivolution_%s_amd64.deb\n```\n\n```\nsudo apt install ./rivolution_%s_amd64.deb\n```' \
              "$GITHUB_REPOSITORY" "$TAG" "$VERSION_REV" "$VERSION_REV")
            gh release edit "$TAG" --notes "${CURRENT_BODY}${NEW_SECTION}"
          else
            echo "==> x64 section already present in release notes, leaving as-is"
          fi
