name: Build x64 .deb packages

on:
  push:
    tags:
      - 'v*'
      # Tags ending in "-test" are for exercising the manual ARM64
      # tag/release flow without also kicking off a real x64 build --
      # e.g. `v6.0.0-1-test`. Use workflow_dispatch instead to test the
      # x64 build itself without any tag at all.
      - '!*-test'
  workflow_dispatch:
    inputs:
      target:
        description: 'Which OS target(s) to build'
        required: false
        default: both
        type: choice
        options:
          - both
          - "26.04"
          - "24.04"

permissions:
  contents: write

jobs:
  build:
    # NOTE: the target-selection condition below (aliased as
    # &target_selected) cannot live at the job level -- GitHub Actions
    # confirmed at runtime that `matrix` isn't a recognized named-value
    # in a job-level `if:` (the job's own `if:` is evaluated before the
    # matrix expands into per-leg instances). So instead every step
    # below carries it individually: the unwanted leg's job still
    # "starts", but every step inside it is skipped in seconds rather
    # than running the real ~39-minute build. Any *new* step added to
    # this job must also carry `if: *target_selected` (or fold it into
    # that step's own condition, as the last two steps below do) --
    # forgetting it would let a step for the unwanted leg actually run.
    strategy:
      # max-parallel: 1 -- the release-notes step below does a
      # read-modify-write (fetch current body, append a section, write
      # back) against the *same* release for both matrix legs. Running
      # them in parallel risks one leg's edit clobbering the other's
      # just-appended section. Serializing costs real wall-clock time
      # (~2x a single build), but avoiding that race isn't worth solving
      # with a more complex retry/lock mechanism for a workflow that only
      # runs on an actual version tag push.
      max-parallel: 1
      matrix:
        include:
          - os: ubuntu-26.04
            suffix: ""
            header: "## x64 build"
            caveat: ""
          - os: ubuntu-24.04
            suffix: "-noble"
            header: "## x64 build (Ubuntu 24.04 -- best-effort)"
            caveat: "\n\nBuilt on Ubuntu 24.04 as a temporary accommodation for cloud providers that don't yet offer 26.04 images. Ubuntu 26.04 remains the primary supported target -- use the build above unless your host genuinely can't offer it yet."
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        if: &target_selected >-
          github.event_name != 'workflow_dispatch' ||
          inputs.target == 'both' ||
          (inputs.target == '26.04' && matrix.os == 'ubuntu-26.04') ||
          (inputs.target == '24.04' && matrix.os == 'ubuntu-24.04')
        uses: actions/checkout@v4

      - name: Install build dependencies
        if: *target_selected
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git g++ automake autoconf autoconf-archive libtool \
            libltdl-dev make debhelper dpkg-dev \
            qt6-base-dev qt6-base-dev-tools qt6-l10n-tools qt6-webengine-dev \
            qt6-webengine-dev-tools libqt6sql6-mysql \
            libexpat1-dev libid3-3.8.3-dev libcurl4-gnutls-dev libcoverart-dev \
            libdiscid-dev libmusicbrainz5-dev libcdparanoia-dev libsndfile1-dev \
            libpam0g-dev libvorbis-dev libsamplerate0-dev libsoundtouch-dev \
            libsystemd-dev libjack-jackd2-dev libasound2-dev libflac-dev \
            libflac++-dev libmp3lame-dev libmad0-dev libtwolame-dev libssl-dev \
            libtag1-dev libmagick++-dev \
            docbook5-xml docbook-xsl-ns xsltproc fop libxml2-utils \
            python3 python3-pycurl python3-pymysql python3-serial python3-requests \
            python3-venv python3-virtualenv python3-build twine \
            apache2 mariadb-server mariadb-client mp3gain gedit \
            golang-go

      - name: Verify Go toolchain version
        if: *target_selected
        run: go version

      - name: Build .deb packages
        if: *target_selected
        run: scripts/rebuild-deb.sh --no-bump

      - name: Collect build artifacts
        if: *target_selected
        run: |
          mkdir -p dist
          mv ../rivolution*.deb ../rivolution*.buildinfo ../rivolution*.changes dist/
          ls -la dist/

      - name: Rename secondary-target artifacts
        if: >-
          matrix.suffix != '' && (github.event_name != 'workflow_dispatch' ||
          inputs.target == 'both' ||
          (inputs.target == '26.04' && matrix.os == 'ubuntu-26.04') ||
          (inputs.target == '24.04' && matrix.os == 'ubuntu-24.04'))
        run: |
          # arch:all packages (opsguide) are identical regardless of which
          # Ubuntu release built them -- the primary (26.04) leg's copy
          # already covers this, so don't re-upload a second, differently
          # -suffixed copy of the same content.
          rm -f dist/*_all.deb
          for f in dist/*; do
            mv "$f" "$(echo "$f" | sed "s/_amd64/_amd64${{ matrix.suffix }}/")"
          done
          ls -la dist/

      - name: Upload workflow artifact
        if: *target_selected
        uses: actions/upload-artifact@v4
        with:
          name: rivolution-x64-debs${{ matrix.suffix }}
          path: dist/*

      - name: Attach to GitHub Release
        if: >-
          startsWith(github.ref, 'refs/tags/') && (github.event_name != 'workflow_dispatch' ||
          inputs.target == 'both' ||
          (inputs.target == '26.04' && matrix.os == 'ubuntu-26.04') ||
          (inputs.target == '24.04' && matrix.os == 'ubuntu-24.04'))
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"

          if ! gh release view "$TAG" >/dev/null 2>&1; then
            echo "==> No release exists yet for $TAG, creating one"
            gh release create "$TAG" --title "$TAG" \
              --notes "Automated x64 build. arm64 build/notes to follow."
          fi

          echo "==> Uploading x64 build artifacts (${{ matrix.os }})"
          gh release upload "$TAG" dist/* --clobber

          VERSION_REV="$(cat versions/PACKAGE_VERSION)-$(grep -oP '(?<=@VERSION@-)[0-9]+(?=\))' debian/changelog.src | head -1)"
          CURRENT_BODY="$(gh release view "$TAG" --json body -q .body)"

          # GitHub silently replaces "~" with "." in uploaded release asset
          # filenames (confirmed empirically on v6.0.0-beta1-1 -- the actual
          # built .deb is named with the real "~", but the asset GitHub
          # stores and serves is not). Compute the download-URL-safe name
          # separately from the real Debian version string used everywhere
          # else, so the wget/apt commands below point at a file that
          # actually exists.
          ASSET_VERSION_REV="${VERSION_REV//\~/.}"
          FILENAME_SUFFIX="${{ matrix.suffix }}"
          HEADER="${{ matrix.header }}"

          if ! grep -qF -- "$HEADER" <<<"$CURRENT_BODY"; then
            echo "==> Appending section to release notes"
            NEW_SECTION=$(printf '\n\n%s\n\n```\nwget https://github.com/%s/releases/download/%s/rivolution_%s_amd64%s.deb\n```\n\n```\nsudo apt install ./rivolution_%s_amd64%s.deb\n```%b' \
              "$HEADER" "$GITHUB_REPOSITORY" "$TAG" "$ASSET_VERSION_REV" "$FILENAME_SUFFIX" "$ASSET_VERSION_REV" "$FILENAME_SUFFIX" "${{ matrix.caveat }}")
            gh release edit "$TAG" --notes "${CURRENT_BODY}${NEW_SECTION}"
          else
            echo "==> Section already present in release notes, leaving as-is"
          fi
